name: Android APK Derle

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu al
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Sistem bağımlılıklarını kur
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk python3-pip autoconf libtool \
            pkg-config zlib1g-dev libncurses-dev libncursesw5-dev libtinfo6 \
            cmake libffi-dev libssl-dev build-essential ccache

      - name: Buildozer ve Cython kur
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython==0.29.36

      - name: Android SDK/NDK önbelleği
        uses: actions/cache@v4
        with:
          path: |
            .buildozer
          key: buildozer-${{ hashFiles('buildozer.spec') }}

      - name: APK derle
        run: |
          yes | buildozer android debug || buildozer android debug

      - name: APK'yı yükle
        uses: actions/upload-artifact@v4
        with:
          name: ultraparkour-apk
          path: bin/*.apk
          if-no-files-found: error
