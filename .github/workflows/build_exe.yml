name: Windows EXE Derle

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Kodu al
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bağımlılıkları kur
        run: |
          python -m pip install --upgrade pip
          pip install pygame pyinstaller

      - name: EXE derle (sadece kod, mp3/png gömülmez)
        run: |
          pyinstaller --onefile --windowed --name ULTRAPARKOUR ULTRAPARKOUR.py

      - name: EXE'yi yükle
        uses: actions/upload-artifact@v4
        with:
          name: ultraparkour-windows-exe
          path: dist/ULTRAPARKOUR.exe
          if-no-files-found: error
